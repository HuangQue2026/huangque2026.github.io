<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>健康养生每一天</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: #ededed;
            line-height: 1.8;
            color: #3a3a3a;
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
            background-color: #fff;
            padding-bottom: 40px;
        }

        .article {
            padding: 28px 18px 0;
        }

        .article-title {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a1a;
            line-height: 1.5;
            margin-bottom: 18px;
        }

        .meta {
            margin-bottom: 18px;
        }

        .meta-top {
            display: flex;
            align-items: center;
            margin-bottom: 4px;
        }

        .avatar {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            background: #07C160;
            margin-right: 8px;
            flex-shrink: 0;
        }

        .meta-name {
            font-size: 15px;
            color: #576b95;
            font-weight: 400;
        }

        .meta-sub {
            display: flex;
            align-items: center;
            font-size: 13px;
            color: #b2b2b2;
            margin-bottom: 12px;
        }

        .meta-sub .dot {
            margin: 0 6px;
            color: #d0d0d0;
        }

        .listen-bar {
            display: flex;
            align-items: center;
            font-size: 15px;
            color: #576b95;
            margin-bottom: 18px;
            cursor: pointer;
        }

        .listen-bar .listen-icon {
            margin-right: 6px;
            font-size: 16px;
        }

        .top-original-link {
            display: inline-flex;
            align-items: center;
            color: #07C160;
            font-size: 15px;
            text-decoration: none;
            margin-bottom: 16px;
            padding: 4px 0;
        }

        .top-original-link .arrow-icon {
            margin-left: 3px;
            font-size: 16px;
        }

        .content {
            margin-bottom: 24px;
        }

        .content p {
            font-size: 18px;
            color: #3a3a3a;
            line-height: 1.9;
            margin-bottom: 14px;
            letter-spacing: 0.5px;
        }

        .featured-image {
            width: 100%;
            margin: 12px 0 20px;
            display: block;
        }

        .read-original-bar {
            margin: 0 18px 30px;
            padding: 20px 0;
            text-align: center;
        }

        .read-original-btn {
            display: inline-block;
            background: #07C160;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            padding: 14px 50px;
            border-radius: 6px;
            letter-spacing: 2px;
        }


        @media (max-width: 640px) {
            .container {
                width: 100%;
            }

            .article {
                padding: 24px 15px 0;
            }

            .article-title {
                font-size: 22px;
            }

            .content p {
                font-size: 17px;
            }

            .read-original-bar {
                margin: 0 15px 25px;
            }
        }

        .ml10 {
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="article">
            <h1 class="article-title">健康生活，从点滴做起</h1>

            <div class="meta">
                <div class="meta-top" style="color: #a4b0be;">
                    <span class="meta-name">健康生活小助手</span>
                     <span class="ml10">2026年5月16日 16:22</span>
                    <span class="dot">&nbsp; &nbsp;</span>
                    <span>上海</span>
                </div>
                <div class="meta-sub">
                   
                </div>
            </div>

            <a id="topOriginalLink" href="https://example.com" class="top-original-link">阅读原文 <span class="arrow-icon">&#8250;</span></a>

            <div class="content">
                <p>随着年龄的增长，越来越多的朋友开始关注养生与健康这个话题。合理的生活方式，不仅能让我们每天都充满活力，也能让家人更加安心。</p>
                <p>保持心情愉快、饮食均衡、适度运动，这三者缺一不可。每天饭后散散步，喝一杯温水，少油少盐，这些看似简单的小习惯，却能带来长久的好处。</p>
                <p>下面为大家整理了一些实用的日常养生小知识，希望能帮助您和您的家人，一起过上更健康、更舒心的生活。</p>
            </div>

            <img class="featured-image" src="https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?w=800&q=80" alt="健康养生">
        </div>

        <div class="read-original-bar">
            <a id="readOriginalLink" href="https://example.com" class="read-original-btn">阅读原文</a>
        </div>

    </div>
</body>

    <script>
        // ========== 配置区域 ==========
        // 在这里修改跳转链接
        var CONFIG = {
            readOriginalUrl: 'https://example.com'
        };
        // ========== 配置区域结束 ==========

        var topLink = document.getElementById('topOriginalLink');
        var bottomLink = document.getElementById('readOriginalLink');
        if (topLink && CONFIG.readOriginalUrl) {
            topLink.href = CONFIG.readOriginalUrl;
        }
        if (bottomLink && CONFIG.readOriginalUrl) {
            bottomLink.href = CONFIG.readOriginalUrl;
        }
    </script>
</body>
</html>
