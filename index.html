<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: #ededed;
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
            background-color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
        }

        .image-wrapper {
            width: 100%;
        }

        .image-wrapper img {
            width: 70px;
            height: 117px;
            display: block;
            margin: 0 auto;
        }

        .btn-wrapper {
            padding: 24px 18px 40px;
            width: 100%;
            text-align: center;
        }

        .read-original-btn {
            display: inline-block;
            background: #07C160;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            padding: 14px 50px;
            border-radius: 6px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="image-wrapper">
            <img src="https://huangqueai-shequn.oss-cn-beijing.aliyuncs.com/0%20%281%29.jpg" alt="图片">
        </div>
        <div class="btn-wrapper">
            <a id="readOriginalLink" href="#" class="read-original-btn">阅读原文</a>
        </div>
    </div>

    <script>
        var params = new URLSearchParams(window.location.search);
        var courseId = params.get('courseId') || '394';
        var userId = params.get('userId') || '265';
        var aChainDomain = params.get('aChainDomain') || 'https://shequn.api.huangqueai.com';

        fetch(aChainDomain + '/app/abChainDomain/getChainDomain/' + courseId + '/3')
            .then(function(res) { return res.json(); })
            .then(function(response) {
                if (response.code === 200 && response.data && response.data.domainName) {
                    var bChainDomain = response.data.domainName;
                    var url = bChainDomain + '/home?courseId=' + courseId + '&userId=' + userId + '&aChainDomain=' + encodeURIComponent(aChainDomain);
                    document.getElementById('readOriginalLink').href = url;
                }
            });
    </script>
</body>
</html>
